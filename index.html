<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;color:#fff;overflow:hidden;flex-direction:column}
canvas{border-radius:6px;image-rendering:pixelated}
#hud{height:36px;display:flex;align-items:center;gap:20px;font-size:13px;color:#7af;margin-bottom:6px}
#hud span{color:#556}
#moves{color:#f6a}
#overlay{position:fixed;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,20,.92);width:100vw;height:100vh;z-index:10;transition:opacity .3s}
#overlay.hide{opacity:0;pointer-events:none}
#overlay h2{font-size:28px;margin-bottom:6px;color:#7af}
#overlay .sub{font-size:13px;color:#999;margin-bottom:18px;text-align:center;line-height:1.7;white-space:pre-line}
#overlay button{padding:12px 36px;font-size:16px;font-family:monospace;background:#7af;color:#0a0a1a;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:background .15s}
#overlay button:hover{background:#adf}
.par{color:#6d6;font-size:12px;margin-bottom:10px}
.keys{font-size:11px;color:#445;margin-top:14px}
</style>
</head>
<body>
<div id="hud">
  <span>MIRROR DRIFT</span>
  <span id="lvl"></span>
  <span id="starsHud"></span>
  <span id="moves"></span>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h2 id="oTitle">Mirror Drift</h2>
  <div class="sub" id="oSub"></div>
  <button id="oBtn">Play</button>
  <div class="keys" id="oKeys"></div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle');
const oSub=document.getElementById('oSub'),oBtn=document.getElementById('oBtn'),oKeys=document.getElementById('oKeys');
const lvlEl=document.getElementById('lvl'),starsEl=document.getElementById('starsHud'),movesEl=document.getElementById('moves');
const S=440,TS=22,GS=S/TS;
C.width=S;C.height=S;

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,type='sine',vol=.12){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);
  o.start();o.stop(AC.currentTime+dur);
}
function sfxMove(){playTone(220,.06,'triangle',.06)}
function sfxWall(){playTone(110,.1,'square',.08)}
function sfxStar(){playTone(660,.15,'sine',.15);setTimeout(()=>playTone(880,.2,'sine',.1),80)}
function sfxLevel(){playTone(440,.12);setTimeout(()=>playTone(554,.12),100);setTimeout(()=>playTone(659,.12),200);setTimeout(()=>playTone(880,.25),300)}
function sfxWin(){for(let i=0;i<6;i++)setTimeout(()=>playTone(440+i*80,.2,'sine',.1),i*100)}

let level=0,totalStars=0,moveCount=0,gameState='menu';
let p1,p2,lStars,particles=[],history=[];
// Smooth animation
let p1draw,p2draw,animating=false;

const levels=[
  {walls:[[3,3,14,3],[3,16,14,16],[3,3,3,16],[16,3,16,16],[7,6,12,6],[7,13,12,13]],
   stars:[[5,5],[14,5],[5,14],[14,14],[10,10]],s1:[4,10],s2:[15,10],par:12},
  {walls:[[2,2,17,2],[2,17,17,17],[2,2,2,17],[17,2,17,17],[6,2,6,8],[13,11,13,17],[9,5,9,14]],
   stars:[[4,5],[15,5],[4,14],[15,14],[10,3],[10,16]],s1:[3,10],s2:[16,10],par:18},
  {walls:[[1,1,18,1],[1,18,18,18],[1,1,1,18],[18,1,18,18],[5,1,5,7],[14,12,14,18],[1,9,7,9],[12,10,18,10],[9,4,9,8],[10,11,10,15]],
   stars:[[3,4],[16,4],[3,15],[16,15],[10,2],[10,17],[7,12],[12,7]],s1:[3,10],s2:[16,10],par:24},
  {walls:[[1,1,18,1],[1,18,18,18],[1,1,1,18],[18,1,18,18],[4,4,8,4],[11,15,15,15],[4,4,4,8],[15,11,15,15],[8,8,8,12],[11,7,11,11],[1,12,4,12],[15,7,18,7]],
   stars:[[3,3],[16,3],[3,16],[16,16],[6,10],[13,9],[10,6],[10,13],[2,7],[17,12]],s1:[2,10],s2:[17,10],par:30},
  {walls:[[0,0,19,0],[0,19,19,19],[0,0,0,19],[19,0,19,19],[3,0,3,6],[16,13,16,19],[0,10,6,10],[13,9,19,9],[7,3,12,3],[7,16,12,16],[7,3,7,7],[12,12,12,16],[9,7,9,12],[10,7,10,12]],
   stars:[[2,3],[17,3],[2,16],[17,16],[5,7],[14,12],[10,1],[10,18],[1,15],[18,4],[5,13],[14,6]],s1:[1,5],s2:[18,14],par:40}
];

function loadLevel(n){
  const l=levels[n];
  p1={x:l.s1[0],y:l.s1[1]};
  p2={x:l.s2[0],y:l.s2[1]};
  p1draw={x:p1.x,y:p1.y};
  p2draw={x:p2.x,y:p2.y};
  lStars=l.stars.map(s=>({x:s[0],y:s[1],got:false,pop:0}));
  particles=[];history=[];moveCount=0;animating=false;
}

function blocked(ox,oy,nx,ny,n){
  if(nx<0||ny<0||nx>=GS||ny>=GS)return true;
  const l=levels[n],dx=nx-ox,dy=ny-oy;
  for(const w of l.walls){
    if(dx!==0&&w[0]===w[2]){
      const wx=w[0],y1=Math.min(w[1],w[3]),y2=Math.max(w[1],w[3]);
      if(wx===(dx>0?ox+1:ox)&&oy>=y1&&oy<y2)return true;
    }
    if(dy!==0&&w[1]===w[3]){
      const wy=w[1],x1=Math.min(w[0],w[2]),x2=Math.max(w[0],w[2]);
      if(wy===(dy>0?oy+1:oy)&&ox>=x1&&ox<x2)return true;
    }
  }
  return false;
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*2.5;
    particles.push({x:x*TS+TS/2,y:y*TS+TS/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color,size:2+Math.random()*3});
  }
}

function tryMove(dx,dy){
  if(animating||gameState!=='play')return;
  const state={p1:{...p1},p2:{...p2},stars:lStars.map(s=>({...s})),mc:moveCount};
  const n1x=p1.x+dx,n1y=p1.y+dy;
  const n2x=p2.x-dx,n2y=p2.y-dy;
  const b1=blocked(p1.x,p1.y,n1x,n1y,level);
  const b2=blocked(p2.x,p2.y,n2x,n2y,level);
  if(b1&&b2){sfxWall();return;}
  history.push(state);
  if(history.length>200)history.shift();
  moveCount++;
  if(!b1){p1.x=n1x;p1.y=n1y;}
  if(!b2){p2.x=n2x;p2.y=n2y;}
  if(b1||b2)sfxWall(); else sfxMove();
  // Animate
  animating=true;
  const startTime=performance.now();
  const dur=80;
  const s1={x:p1draw.x,y:p1draw.y},s2={x:p2draw.x,y:p2draw.y};
  function anim(now){
    let t=Math.min((now-startTime)/dur,1);
    t=t*t*(3-2*t); // smoothstep
    p1draw.x=s1.x+(p1.x-s1.x)*t;
    p1draw.y=s1.y+(p1.y-s1.y)*t;
    p2draw.x=s2.x+(p2.x-s2.x)*t;
    p2draw.y=s2.y+(p2.y-s2.y)*t;
    if(t<1)requestAnimationFrame(anim);
    else{animating=false;checkStars();}
  }
  requestAnimationFrame(anim);
}

function checkStars(){
  let gotOne=false;
  for(const s of lStars){
    if(s.got)continue;
    if((p1.x===s.x&&p1.y===s.y)||(p2.x===s.x&&p2.y===s.y)){
      s.got=true;s.pop=1;totalStars++;gotOne=true;
      spawnParticles(s.x,s.y,'#ff0',12);
      sfxStar();
    }
  }
  if(lStars.every(s=>s.got)){
    setTimeout(()=>{
      level++;
      if(level>=levels.length){
        sfxWin();
        showOverlay('You Win!',`All ${levels.length} levels cleared!\nTotal stars: ${totalStars}\nTotal moves: ${moveCount}`,'Play Again');
        gameState='menu';level=0;totalStars=0;
      }else{
        sfxLevel();
        const l=levels[level-1];
        const rating=moveCount<=l.par?'PERFECT':'GOOD';
        showOverlay('Level Complete!',`Moves: ${moveCount} / Par: ${l.par}\nRating: ${rating}`,'Next Level');
        gameState='menu';
      }
    },400);
  }
}

function undo(){
  if(history.length===0||animating)return;
  const s=history.pop();
  // Undo star collection
  const prevGot=s.stars.filter(st=>st.got).length;
  const curGot=lStars.filter(st=>st.got).length;
  totalStars-=(curGot-prevGot);
  p1.x=s.p1.x;p1.y=s.p1.y;
  p2.x=s.p2.x;p2.y=s.p2.y;
  lStars=s.stars;moveCount=s.mc;
  p1draw.x=p1.x;p1draw.y=p1.y;
  p2draw.x=p2.x;p2draw.y=p2.y;
  playTone(180,.08,'triangle',.05);
}

function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,S,S);
  // Grid dots
  X.fillStyle='#181832';
  for(let i=1;i<GS;i++)for(let j=1;j<GS;j++){
    X.fillRect(i*TS-0.5,j*TS-0.5,1,1);
  }
  if(gameState!=='play')return;
  const l=levels[level],t=performance.now()/1000;
  // Walls with glow
  X.lineCap='round';
  X.strokeStyle='#334';X.lineWidth=3;X.shadowColor='#446';X.shadowBlur=8;
  for(const w of l.walls){X.beginPath();X.moveTo(w[0]*TS,w[1]*TS);X.lineTo(w[2]*TS,w[3]*TS);X.stroke();}
  X.strokeStyle='#668';X.lineWidth=1.5;X.shadowBlur=0;
  for(const w of l.walls){X.beginPath();X.moveTo(w[0]*TS,w[1]*TS);X.lineTo(w[2]*TS,w[3]*TS);X.stroke();}
  // Stars
  for(const s of lStars){
    if(s.got){
      if(s.pop>0){s.pop-=0.04;X.globalAlpha=s.pop;X.fillStyle='#ff0';
        X.beginPath();X.arc(s.x*TS+TS/2,s.y*TS+TS/2,TS/2*s.pop,0,Math.PI*2);X.fill();X.globalAlpha=1;}
      continue;
    }
    const pulse=.7+Math.sin(t*3+s.x*2+s.y)*0.3;
    const cx=s.x*TS+TS/2,cy=s.y*TS+TS/2;
    X.shadowColor='#ff0';X.shadowBlur=10*pulse;
    X.fillStyle=`rgba(255,255,80,${pulse})`;
    X.beginPath();
    for(let i=0;i<5;i++){
      const a=Math.PI*2/5*i-Math.PI/2+t*.5;
      X.lineTo(cx+Math.cos(a)*5,cy+Math.sin(a)*5);
      X.lineTo(cx+Math.cos(a+Math.PI/5)*2,cy+Math.sin(a+Math.PI/5)*2);
    }
    X.closePath();X.fill();
    X.shadowBlur=0;
  }
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life-=.025;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life;X.fillStyle=p.color;
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  X.globalAlpha=1;
  // Player trails (ghostly previous positions)
  if(history.length>0){
    const last=history[history.length-1];
    X.globalAlpha=.15;
    X.fillStyle='#6bf';X.beginPath();X.arc(last.p1.x*TS+TS/2,last.p1.y*TS+TS/2,5,0,Math.PI*2);X.fill();
    X.fillStyle='#f6a';X.beginPath();X.arc(last.p2.x*TS+TS/2,last.p2.y*TS+TS/2,5,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }
  // Players
  const bob=Math.sin(t*4)*1.5;
  // P1 blue
  X.shadowColor='#6bf';X.shadowBlur=14;X.fillStyle='#6bf';
  X.beginPath();X.arc(p1draw.x*TS+TS/2,p1draw.y*TS+TS/2+bob,7,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.shadowBlur=0;
  X.beginPath();X.arc(p1draw.x*TS+TS/2-2,p1draw.y*TS+TS/2+bob-2,2,0,Math.PI*2);X.fill();
  // P2 pink
  X.shadowColor='#f6a';X.shadowBlur=14;X.fillStyle='#f6a';
  X.beginPath();X.arc(p2draw.x*TS+TS/2,p2draw.y*TS+TS/2-bob,7,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.shadowBlur=0;
  X.beginPath();X.arc(p2draw.x*TS+TS/2-2,p2draw.y*TS+TS/2-bob-2,2,0,Math.PI*2);X.fill();
  // HUD
  const rem=lStars.filter(s=>!s.got).length;
  lvlEl.textContent='Level '+(level+1)+'/'+levels.length;
  starsEl.textContent='Stars: '+(lStars.length-rem)+'/'+lStars.length;
  movesEl.textContent='Moves: '+moveCount+' (par: '+levels[level].par+')';
}

function showOverlay(title,sub,btn){
  oTitle.textContent=title;oSub.textContent=sub;oBtn.textContent=btn;
  oKeys.textContent='Arrow keys / WASD to move | Z = undo | R = restart';
  overlay.classList.remove('hide');
}

oBtn.addEventListener('click',()=>{
  AC.resume();
  overlay.classList.add('hide');
  loadLevel(level);gameState='play';
});

// Input: single keydown triggers move
let inputQueue=[];
document.addEventListener('keydown',e=>{
  if(gameState!=='play')return;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key))e.preventDefault();
  if(e.repeat)return;
  if(e.key==='z'||e.key==='Z'){undo();return;}
  if(e.key==='r'||e.key==='R'){loadLevel(level);return;}
  const map={'ArrowUp':[0,-1],'w':[0,-1],'ArrowDown':[0,1],'s':[0,1],'ArrowLeft':[-1,0],'a':[-1,0],'ArrowRight':[1,0],'d':[1,0]};
  if(map[e.key])tryMove(...map[e.key]);
});

// Touch swipe
let touchS=null;
C.addEventListener('touchstart',e=>{e.preventDefault();touchS={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
C.addEventListener('touchend',e=>{
  if(!touchS)return;
  const dx=e.changedTouches[0].clientX-touchS.x,dy=e.changedTouches[0].clientY-touchS.y;
  const ad=Math.abs(dx),ay=Math.abs(dy);
  if(Math.max(ad,ay)<15)return;
  if(ad>ay)tryMove(dx>0?1:-1,0);else tryMove(0,dy>0?1:-1);
  touchS=null;
},{passive:false});

function loop(){draw();requestAnimationFrame(loop);}
showOverlay('Mirror Drift','Two dots. One input. Opposite directions.\nCollect all the stars to clear each level.\n\nThe catch? They mirror your moves!','Play');
loop();
</script>
</body>
</html>
