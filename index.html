<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;color:#fff;overflow:hidden}
canvas{border:2px solid #333;border-radius:4px}
#ui{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none}
#ui h1{font-size:16px;color:#7af}
#ui p{font-size:12px;color:#888;margin-top:4px}
#overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);pointer-events:auto}
#overlay h2{font-size:22px;margin-bottom:8px}
#overlay .sub{font-size:13px;color:#aaa;margin-bottom:16px;text-align:center;line-height:1.5}
#overlay button{padding:10px 28px;font-size:15px;font-family:monospace;background:#7af;color:#000;border:none;border-radius:4px;cursor:pointer}
#overlay button:hover{background:#5df}
#stats{font-size:12px;color:#7af;margin-top:6px}
</style>
</head>
<body>
<div id="ui"><h1>MIRROR DRIFT</h1><p id="stats"></p></div>
<canvas id="c"></canvas>
<div id="overlay"><h2 id="oTitle"></h2><div class="sub" id="oSub"></div><button id="oBtn">Start</button></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle');
const oSub=document.getElementById('oSub'),oBtn=document.getElementById('oBtn');
const stats=document.getElementById('stats');
const W=400,H=400,TS=20;
C.width=W;C.height=H;
overlay.style.width=W+'px';overlay.style.height=H+'px';
let level=0,stars=0,deaths=0,keys={},gameState='menu',aniId;
const levels=[
  {walls:[[3,3,14,3],[3,16,14,16],[3,3,3,16],[16,3,16,16],[7,6,12,6],[7,13,12,13]],
   stars:[[5,5],[14,5],[5,14],[14,14],[10,10]],s1:[4,10],s2:[15,10]},
  {walls:[[2,2,17,2],[2,17,17,17],[2,2,2,17],[17,2,17,17],[6,2,6,8],[13,11,13,17],[9,5,9,14]],
   stars:[[4,5],[15,5],[4,14],[15,14],[10,3],[10,16]],s1:[3,10],s2:[16,10]},
  {walls:[[1,1,18,1],[1,18,18,18],[1,1,1,18],[18,1,18,18],[5,1,5,7],[14,12,14,18],[1,9,7,9],[12,10,18,10],[9,4,9,8],[10,11,10,15]],
   stars:[[3,4],[16,4],[3,15],[16,15],[10,2],[10,17],[7,12],[12,7]],s1:[3,10],s2:[16,10]},
  {walls:[[1,1,18,1],[1,18,18,18],[1,1,1,18],[18,1,18,18],[4,4,8,4],[11,15,15,15],[4,4,4,8],[15,11,15,15],[8,8,8,12],[11,7,11,11],[1,12,4,12],[15,7,18,7]],
   stars:[[3,3],[16,3],[3,16],[16,16],[6,10],[13,9],[10,6],[10,13],[2,7],[17,12]],s1:[2,10],s2:[17,10]},
  {walls:[[0,0,19,0],[0,19,19,19],[0,0,0,19],[19,0,19,19],[3,0,3,6],[16,13,16,19],[0,10,6,10],[13,9,19,9],[7,3,12,3],[7,16,12,16],[7,3,7,7],[12,12,12,16],[9,7,9,12],[10,7,10,12]],
   stars:[[2,3],[17,3],[2,16],[17,16],[5,7],[14,12],[10,1],[10,18],[1,15],[18,4],[5,13],[14,6]],s1:[1,5],s2:[18,14]}
];
let p1,p2,lStars,trail1,trail2;
function loadLevel(n){
  const l=levels[n];
  p1={x:l.s1[0],y:l.s1[1]};
  p2={x:l.s2[0],y:l.s2[1]};
  lStars=l.stars.map(s=>({x:s[0],y:s[1],got:false,pop:0}));
  trail1=[];trail2=[];
}
function wallAt(x,y,n){
  const l=levels[n];
  for(const w of l.walls){
    if(w[0]===w[2]){// vertical
      const wx=w[0],y1=Math.min(w[1],w[3]),y2=Math.max(w[1],w[3]);
      if(x===wx&&y>=y1&&y<=y2)return true;
    }
    if(w[1]===w[3]){// horizontal
      const wy=w[1],x1=Math.min(w[0],w[2]),x2=Math.max(w[0],w[2]);
      if(y===wy&&x>=x1&&x<=x2)return true;
    }
  }
  return false;
}
function blocked(ox,oy,nx,ny,n){
  // Check if moving from (ox,oy) to (nx,ny) crosses a wall edge
  if(nx<0||ny<0||nx>=W/TS||ny>=H/TS)return true;
  const l=levels[n];
  const dx=nx-ox,dy=ny-oy;
  for(const w of l.walls){
    if(dx!==0&&w[0]===w[2]){// crossing vertical wall
      const wx=w[0],y1=Math.min(w[1],w[3]),y2=Math.max(w[1],w[3]);
      const crossX=dx>0?ox+1:ox;
      if(wx===crossX){
        const cy=Math.min(oy,ny),my=Math.max(oy,ny);
        if(oy>=y1&&oy<y2)return true;
      }
    }
    if(dy!==0&&w[1]===w[3]){// crossing horizontal wall
      const wy=w[1],x1=Math.min(w[0],w[2]),x2=Math.max(w[0],w[2]);
      const crossY=dy>0?oy+1:oy;
      if(wy===crossY){
        if(ox>=x1&&ox<x2)return true;
      }
    }
  }
  return false;
}
let moveCD=0;
function tryMove(dx,dy){
  if(moveCD>0)return;
  moveCD=6;
  const n1x=p1.x+dx,n1y=p1.y+dy;
  const n2x=p2.x-dx,n2y=p2.y-dy;
  const b1=blocked(p1.x,p1.y,n1x,n1y,level);
  const b2=blocked(p2.x,p2.y,n2x,n2y,level);
  if(!b1){trail1.push({x:p1.x,y:p1.y,a:1});p1.x=n1x;p1.y=n1y;}
  if(!b2){trail2.push({x:p2.x,y:p2.y,a:1});p2.x=n2x;p2.y=n2y;}
  if(trail1.length>12)trail1.shift();
  if(trail2.length>12)trail2.shift();
  // Check star collection
  for(const s of lStars){
    if(s.got)continue;
    if((p1.x===s.x&&p1.y===s.y)||(p2.x===s.x&&p2.y===s.y)){
      s.got=true;s.pop=1;stars++;
    }
  }
  if(lStars.every(s=>s.got)){
    setTimeout(()=>{
      level++;
      if(level>=levels.length){showOverlay('You Win!','All levels cleared!\nStars: '+stars+' | Deaths: '+deaths,'Again');gameState='menu';level=0;stars=0;deaths=0;}
      else{loadLevel(level);}
    },300);
  }
}
function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  // Grid
  X.strokeStyle='#151530';X.lineWidth=0.5;
  for(let i=0;i<=W/TS;i++){X.beginPath();X.moveTo(i*TS,0);X.lineTo(i*TS,H);X.stroke();}
  for(let i=0;i<=H/TS;i++){X.beginPath();X.moveTo(0,i*TS);X.lineTo(W,i*TS);X.stroke();}
  // Walls
  const l=levels[level];
  X.strokeStyle='#556';X.lineWidth=2;X.shadowColor='#447';X.shadowBlur=6;
  for(const w of l.walls){
    X.beginPath();X.moveTo(w[0]*TS,w[1]*TS);X.lineTo(w[2]*TS,w[3]*TS);X.stroke();
  }
  X.shadowBlur=0;
  // Stars
  const t=Date.now()/1000;
  for(const s of lStars){
    if(s.got){
      if(s.pop>0){
        s.pop-=0.03;
        X.fillStyle=`rgba(255,255,100,${s.pop})`;
        X.beginPath();X.arc(s.x*TS+TS/2,s.y*TS+TS/2,TS*s.pop,0,Math.PI*2);X.fill();
      }
      continue;
    }
    const pulse=Math.sin(t*3+s.x+s.y)*0.2+0.8;
    X.fillStyle=`rgba(255,255,100,${pulse})`;
    X.shadowColor='#ff0';X.shadowBlur=8;
    const cx=s.x*TS+TS/2,cy=s.y*TS+TS/2,r=4;
    X.beginPath();
    for(let i=0;i<5;i++){
      const a=Math.PI*2/5*i-Math.PI/2+t;
      X.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      const a2=a+Math.PI/5;
      X.lineTo(cx+Math.cos(a2)*r*0.4,cy+Math.sin(a2)*r*0.4);
    }
    X.closePath();X.fill();
    X.shadowBlur=0;
  }
  // Trails
  for(const tr of trail1){
    tr.a-=0.02;
    if(tr.a>0){X.fillStyle=`rgba(100,180,255,${tr.a*0.3})`;X.fillRect(tr.x*TS+4,tr.y*TS+4,TS-8,TS-8);}
  }
  for(const tr of trail2){
    tr.a-=0.02;
    if(tr.a>0){X.fillStyle=`rgba(255,120,180,${tr.a*0.3})`;X.fillRect(tr.x*TS+4,tr.y*TS+4,TS-8,TS-8);}
  }
  // Players
  const bob=Math.sin(t*4)*1.5;
  X.fillStyle='#6bf';X.shadowColor='#6bf';X.shadowBlur=10;
  X.beginPath();X.arc(p1.x*TS+TS/2,p1.y*TS+TS/2+bob,6,0,Math.PI*2);X.fill();
  X.fillStyle='#f6a';X.shadowColor='#f6a';
  X.beginPath();X.arc(p2.x*TS+TS/2,p2.y*TS+TS/2-bob,6,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // HUD
  const rem=lStars.filter(s=>!s.got).length;
  stats.textContent='Level '+(level+1)+'/'+levels.length+' | Stars left: '+rem+' | Collected: '+stars;
}
function showOverlay(title,sub,btn){
  oTitle.textContent=title;oSub.textContent=sub;oBtn.textContent=btn;
  overlay.style.display='flex';
}
function hideOverlay(){overlay.style.display='none';}
function gameLoop(){
  if(gameState!=='play'){aniId=requestAnimationFrame(gameLoop);return;}
  if(moveCD>0)moveCD--;
  if(moveCD===0){
    if(keys['ArrowUp']||keys['w'])tryMove(0,-1);
    else if(keys['ArrowDown']||keys['s'])tryMove(0,1);
    else if(keys['ArrowLeft']||keys['a'])tryMove(-1,0);
    else if(keys['ArrowRight']||keys['d'])tryMove(1,0);
  }
  draw();
  aniId=requestAnimationFrame(gameLoop);
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
oBtn.addEventListener('click',()=>{
  hideOverlay();loadLevel(level);gameState='play';
});
// Touch controls
let touchStart=null;
C.addEventListener('touchstart',e=>{e.preventDefault();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
C.addEventListener('touchend',e=>{
  if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x;
  const dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)){tryMove(dx>0?1:-1,0);}
  else{tryMove(0,dy>0?1:-1);}
  touchStart=null;
},{passive:false});
showOverlay('Mirror Drift','Control two dots with arrow keys / WASD.\nThey move in OPPOSITE directions!\nCollect all stars to advance.','Play');
gameLoop();
</script>
</body>
</html>
